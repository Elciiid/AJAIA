# Local Postgres for development.
# Production uses Supabase Postgres (set DATABASE_URL / DIRECT_URL in the host env).
services:
  db:
    image: postgres:16-alpine
    container_name: ajaia-docs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ajaia_docs
    ports:
      - "5432:5432"
    volumes:
      - ajaia_docs_pgdata:/var/lib/postgresql/data

volumes:
  ajaia_docs_pgdata:
